name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # windows-latest ships Visual Studio 2022 + CMake; setup-msbuild makes
      # the MSVC toolchain reliably discoverable so `pip install kenlm`
      # (a C++ extension built via CMake) succeeds on the runner — the build
      # that fails on a plain dev box without VS Build Tools.
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # KenLM has no Windows wheel on PyPI — it is compiled from source here.
      # Required by pyctcdecode for GigaAM v3 CTC + LM decoding; pulled in
      # explicitly because it is an optional import in pyctcdecode and is not
      # listed in requirements.txt (so local builds don't fail without MSVC).
      - name: Build & install kenlm
        run: pip install kenlm

      - name: Build Zapis.exe
        run: .\build.ps1
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zapis-windows
          path: |
            dist/Zapis.exe
            dist/settings.json
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Zapis.exe
            dist/settings.json
