name: Build Zapis

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: Zapis-windows
            build_cmd: .\build.ps1
            build_shell: pwsh
          - os: ubuntu-latest
            artifact: Zapis-linux
            build_cmd: bash build.sh
            build_shell: bash
          - os: macos-13
            artifact: Zapis-macos-intel
            build_cmd: bash build.sh
            build_shell: bash
          - os: macos-latest
            artifact: Zapis-macos-arm
            build_cmd: bash build.sh
            build_shell: bash

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Windows: MSVC toolchain for kenlm C++ extension
      - name: Add MSBuild to PATH
        if: ${{ runner.os == 'Windows' }}
        uses: microsoft/setup-msbuild@v2

      # macOS: Xcode CLI tools for kenlm C++ extension
      - name: Install Xcode CLI tools
        if: ${{ runner.os == 'macOS' }}
        run: |
          if ! xcode-select -p &>/dev/null; then
            xcode-select --install 2>/dev/null || true
          fi

      # Linux: system deps for pywebview (WebKitGTK)
      - name: Install Linux system dependencies
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # KenLM: C++ extension. Has wheels for Linux/macOS on PyPI;
      # on Windows it must be compiled (needs MSVC, provided above).
      - name: Build & install kenlm
        run: pip install kenlm

      - name: Build Zapis
        run: ${{ matrix.build_cmd }}
        shell: ${{ matrix.build_shell }}

      - name: Upload artifact (Windows)
        if: ${{ runner.os == 'Windows' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/Zapis.exe
            dist/settings.json
          if-no-files-found: error

      - name: Upload artifact (Linux)
        if: ${{ runner.os == 'Linux' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/Zapis
            dist/settings.json
          if-no-files-found: error

      - name: Upload artifact (macOS)
        if: ${{ runner.os == 'macOS' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/Zapis.app
            dist/settings.json
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Zapis*
            dist/settings.json
